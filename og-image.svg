<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16224a"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3a63f0"/>
      <stop offset="1" stop-color="#1f3bbf"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2f56e6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2f56e6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <circle cx="980" cy="120" r="320" fill="url(#glow)"/>

  <!-- brand row -->
  <g transform="translate(90, 86)">
    <rect width="64" height="64" rx="18" fill="url(#mark)"/>
    <circle cx="32" cy="32" r="18" fill="none" stroke="#fff" stroke-width="4" opacity="0.9"/>
    <circle cx="32" cy="32" r="8.4" fill="#fff"/>
    <text x="86" y="44" font-family="Inter, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Plato Trillion</text>
  </g>

  <!-- headline -->
  <text x="90" y="320" font-family="Inter, Segoe UI, sans-serif" font-size="76" font-weight="800" fill="#ffffff" letter-spacing="-2">
    <tspan x="90" dy="0">Complete visibility into</tspan>
    <tspan x="90" dy="92">the spaces you operate.</tspan>
  </text>

  <!-- subhead -->
  <text x="92" y="520" font-family="Inter, Segoe UI, sans-serif" font-size="32" font-weight="500" fill="#aab6cf" letter-spacing="-0.3">Visual monitoring infrastructure for modern operations.</text>

  <rect x="92" y="556" width="64" height="5" rx="2.5" fill="#2f56e6"/>
</svg>
